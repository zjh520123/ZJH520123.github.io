<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>痰湿体质干预方案 · 临床对比工具</title>
    <!-- Chart.js 轻量图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f5f7fb;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 28px 24px;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1e3c5c;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .subtitle {
            color: #5e6f8d;
            margin-bottom: 28px;
            font-size: 1.1rem;
            border-left: 4px solid #3a7ca5;
            padding-left: 18px;
        }
        .input-panel {
            background: #eef3fa;
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 24px 40px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            min-width: 180px;
        }
        .input-group label {
            font-weight: 600;
            color: #1e3c5c;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .input-group input {
            padding: 12px 16px;
            font-size: 1.2rem;
            border: 2px solid #bdd0e6;
            border-radius: 16px;
            outline: none;
            transition: 0.2s;
            background: white;
            font-weight: 500;
            color: #0a1e2c;
        }
        .input-group input:focus {
            border-color: #3a7ca5;
            box-shadow: 0 0 0 3px rgba(58,124,165,0.2);
        }
        .input-group small {
            margin-top: 6px;
            color: #4e6b8a;
            font-size: 0.9rem;
        }
        .btn {
            background: #1e3c5c;
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,20,40,0.2);
            transition: 0.15s;
            border: 1px solid #2c5a7a;
            margin-left: auto;
        }
        .btn:hover {
            background: #2b5580;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }
        .btn:active {
            background: #16344b;
            transform: scale(0.98);
        }
        .chart-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }
        .chart-card {
            flex: 1 1 500px;
            background: #fafcff;
            border-radius: 24px;
            padding: 18px 16px 10px 16px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 6px 14px rgba(46, 65, 86, 0.08);
            border: 1px solid #d9e2ec;
        }
        .chart-card h2 {
            margin: 0 0 12px 0;
            font-weight: 500;
            color: #1e3c5c;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .badge {
            background: #d4e2f0;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 1rem;
            color: #1e3c5c;
            font-weight: 400;
        }
        .scheme-detail {
            margin: 12px 0 5px 0;
            font-size: 1.2rem;
            background: #e6edf6;
            padding: 14px 18px;
            border-radius: 20px;
            color: #0f2a3f;
            line-height: 1.6;
        }
        .scheme-detail span {
            font-weight: 700;
            color: #003057;
        }
        .canvas-wrapper {
            position: relative;
            height: 280px;
            width: 100%;
            margin: 5px 0 10px 0;
        }
        .footer-note {
            margin-top: 20px;
            text-align: right;
            color: #6c85a3;
            font-size: 0.95rem;
        }
        .error-msg {
            color: #c0392b;
            font-weight: 500;
            margin-left: 20px;
        }
        @media (max-width: 700px) {
            .input-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                margin-left: 0;
                width: 100%;
            }
            .chart-card h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        🧘 痰湿体质 · 干预方案优化
        <span style="font-size: 1rem; background: #cbddec; padding: 4px 18px; border-radius: 30px;">基于成本-效果分析</span>
    </h1>
    <div class="subtitle">输入患者特征 — 即刻对比「效果最优」与「性价比最优」方案</div>

    <!-- 输入区域 -->
    <div class="input-panel">
        <div class="input-group">
            <label>📌 年龄组 (1~5)</label>
            <input type="number" id="ageGroup" min="1" max="5" step="1" value="2" placeholder="例如 2">
            <small>1:40-49 2:50-59 3:60-69 4:70-79 5:80-89</small>
        </div>
        <div class="input-group">
            <label>📊 活动总分 (0-100)</label>
            <input type="number" id="actScore" min="0" max="100" step="0.1" value="38" placeholder="ADL+IADL">
            <small>&lt;40→强度1级, 40-59→2级, ≥60→3级</small>
        </div>
        <div class="input-group">
            <label>🌿 初始痰湿积分</label>
            <input type="number" id="phlegmInit" min="0" max="100" step="0.1" value="64" placeholder="例如 64">
            <small>≤58→1级调理, 59-61→1或2级, ≥62→1~3级</small>
        </div>
        <button class="btn" id="analyzeBtn">✨ 生成对比方案</button>
        <span id="errorMsg" class="error-msg"></span>
    </div>

    <!-- 双图表展示区 -->
    <div class="chart-row">
        <!-- 左: 效果最优 -->
        <div class="chart-card">
            <h2>🎯 效果最优方案 <span class="badge">预算内最小化积分</span></h2>
            <div id="effectDetail" class="scheme-detail">等待输入…</div>
            <div class="canvas-wrapper">
                <canvas id="chartEffect"></canvas>
            </div>
        </div>
        <!-- 右: 性价比最优 -->
        <div class="chart-card">
            <h2>💰 性价比最优方案 <span class="badge">最优ICER</span></h2>
            <div id="valueDetail" class="scheme-detail">等待输入…</div>
            <div class="canvas-wrapper">
                <canvas id="chartValue"></canvas>
            </div>
        </div>
    </div>
    <div class="footer-note">
        * 预算上限2000元 · 6个月干预 · ICER = 增量成本/增量效果(积分下降)
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 模型常量 (与附表2、3完全一致) ----------
        const REG_COST_MONTH = [30, 80, 130];
        const REG_DECLINE_BASE = [0.02, 0.04, 0.06];
        const INTENSITY_COST_PER_SESSION = [3, 5, 8];
        const INTENSITY_EXTRA_DECLINE = [0, 0.03, 0.06];
        const BASE_FREQ = 5;
        const FREQ_EXTRA_PER_SESSION = 0.01;
        const WEEKS = 24;
        const MONTHS = WEEKS / 4;   // 6
        const MAX_BUDGET = 2000;

        // 年龄允许最大强度 (年龄组索引1~5)
        const MAX_INTENSITY_BY_AGE = [3, 3, 2, 2, 1];  // 索引0对应年龄组1

        // 活动评分允许最大强度
        function maxIntensityByScore(score) {
            if (score < 40) return 1;
            if (score < 60) return 2;
            return 3;
        }

        // 允许的调理分级 (根据初始积分)
        function allowedRegLevels(initPhlegm) {
            if (initPhlegm <= 58) return [1];
            if (initPhlegm >= 59 && initPhlegm <= 61) return [1, 2];
            return [1, 2, 3];
        }

        // ---------- 生成所有可行方案 ----------
        function generateSchemes(initPhlegm, ageGroup, actScore) {
            const allowedR = allowedRegLevels(initPhlegm);
            const maxS = Math.min(MAX_INTENSITY_BY_AGE[ageGroup - 1], maxIntensityByScore(actScore));
            const schemes = [];

            for (let r of allowedR) {
                for (let s = 1; s <= maxS; s++) {
                    for (let f = 1; f <= 10; f++) {
                        const cost = MONTHS * REG_COST_MONTH[r-1] + WEEKS * f * INTENSITY_COST_PER_SESSION[s-1];
                        if (cost > MAX_BUDGET) continue;

                        const baseDec = REG_DECLINE_BASE[r-1];
                        const intensityBonus = INTENSITY_EXTRA_DECLINE[s-1];
                        const freqBonus = Math.max(0, f - BASE_FREQ) * FREQ_EXTRA_PER_SESSION;
                        const monthlyDec = baseDec + intensityBonus + freqBonus;
                        
                        // 指数衰减: final = initial * (1 - monthlyDec)^6
                        const finalPhlegm = initPhlegm * Math.pow(1 - monthlyDec, MONTHS);
                        const decline = initPhlegm - finalPhlegm;
                        const declinePct = (decline / initPhlegm) * 100;

                        schemes.push({
                            r, s, f, cost,
                            finalPhlegm, decline, declinePct,
                            monthlyDec
                        });
                    }
                }
            }
            return schemes;
        }

        // ---------- 效果最优: 预算内最小化 finalPhlegm ----------
        function selectMaxEffect(schemes) {
            const valid = schemes.filter(s => s.cost <= MAX_BUDGET);
            if (valid.length === 0) throw new Error('无方案满足预算约束');
            return valid.reduce((best, cur) => cur.finalPhlegm < best.finalPhlegm ? cur : best);
        }

        // ---------- 性价比最优: 非支配前沿 + 最小ICER (不强制阈值，求最优单位成本效果) ----------
        function selectBestValue(schemes) {
            // 按成本升序排序
            const sorted = [...schemes].sort((a, b) => a.cost - b.cost);
            const n = sorted.length;
            
            // 剔除非支配方案 (成本更高且效果不更优)
            const keep = new Array(n).fill(true);
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    if (sorted[j].cost <= sorted[i].cost && 
                        sorted[j].finalPhlegm <= sorted[i].finalPhlegm &&
                        (sorted[j].cost < sorted[i].cost || sorted[j].finalPhlegm < sorted[i].finalPhlegm)) {
                        keep[i] = false;
                        break;
                    }
                }
            }
            const nondominated = sorted.filter((_, idx) => keep[idx]);
            
            if (nondominated.length === 0) throw new Error('无非支配方案');
            
            // 计算ICER，选择最小ICER方案 (效果提升相对成本的比率)
            let bestScheme = nondominated[0];
            let bestICER = Infinity;
            
            for (let i = 1; i < nondominated.length; i++) {
                const prev = nondominated[i-1];
                const curr = nondominated[i];
                const deltaCost = curr.cost - prev.cost;
                const deltaEffect = prev.finalPhlegm - curr.finalPhlegm;  // 下降值为正
                if (deltaEffect <= 1e-9) continue;  // 效果未改善
                const icer = deltaCost / deltaEffect;
                if (icer < bestICER) {
                    bestICER = icer;
                    bestScheme = curr;
                }
            }
            return bestScheme;
        }

        // ---------- 绘制柱状图 (Chart.js) ----------
        let chartEffectInstance = null;
        let chartValueInstance = null;

        function renderCharts(initPhlegm, planEffect, planValue) {
            const ctxEffect = document.getElementById('chartEffect').getContext('2d');
            const ctxValue = document.getElementById('chartValue').getContext('2d');
            
            // 销毁旧图表
            if (chartEffectInstance) chartEffectInstance.destroy();
            if (chartValueInstance) chartValueInstance.destroy();

            const labels = ['干预前', '干预后'];
            const effectData = [initPhlegm, planEffect.finalPhlegm];
            const valueData = [initPhlegm, planValue.finalPhlegm];

            // 效果最优图 (蓝色调)
            chartEffectInstance = new Chart(ctxEffect, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '痰湿积分',
                        data: effectData,
                        backgroundColor: ['#c0504e', '#4f81bd'],
                        borderRadius: 8,
                        barPercentage: 0.65,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { bodyFont: { size: 16 } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: Math.max(initPhlegm, planEffect.finalPhlegm) * 1.25,
                            grid: { color: '#dbe2ea' },
                            title: {
                                display: true,
                                text: '痰湿积分',
                                font: { size: 18, weight: '500' }
                            },
                            ticks: { font: { size: 16 } }
                        },
                        x: {
                            ticks: { font: { size: 18, weight: '500' } }
                        }
                    }
                }
            });

            // 性价比最优图 (橙色调)
            chartValueInstance = new Chart(ctxValue, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '痰湿积分',
                        data: valueData,
                        backgroundColor: ['#c0504e', '#e8a75e'],
                        borderRadius: 8,
                        barPercentage: 0.65,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { bodyFont: { size: 16 } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: Math.max(initPhlegm, planValue.finalPhlegm) * 1.25,
                            grid: { color: '#dbe2ea' },
                            title: {
                                display: true,
                                text: '痰湿积分',
                                font: { size: 18, weight: '500' }
                            },
                            ticks: { font: { size: 16 } }
                        },
                        x: {
                            ticks: { font: { size: 18, weight: '500' } }
                        }
                    }
                }
            });

            // 在柱顶显示数值 (使用插件或内置注解? 简单起见直接用文字放在detail里，图表内通过tooltip查看)
            // 为了更清晰，我们可以在detail里已经展示了具体数值。
        }

        // 更新文本详情
        function updateDetailText(planEffect, planValue, initPhlegm) {
            const effectDiv = document.getElementById('effectDetail');
            const valueDiv = document.getElementById('valueDetail');
            
            effectDiv.innerHTML = `
                <span>📋 方案:</span> 调理 ${planEffect.r} 级 · 强度 ${planEffect.s} 级 · 每周 ${planEffect.f} 次<br>
                <span>💰 总成本:</span> ${planEffect.cost.toFixed(0)} 元 &nbsp;&nbsp; 
                <span>📉 最终积分:</span> ${planEffect.finalPhlegm.toFixed(1)} (下降 ${planEffect.decline.toFixed(1)} , ${planEffect.declinePct.toFixed(1)}%)
            `;
            
            valueDiv.innerHTML = `
                <span>📋 方案:</span> 调理 ${planValue.r} 级 · 强度 ${planValue.s} 级 · 每周 ${planValue.f} 次<br>
                <span>💰 总成本:</span> ${planValue.cost.toFixed(0)} 元 &nbsp;&nbsp; 
                <span>📉 最终积分:</span> ${planValue.finalPhlegm.toFixed(1)} (下降 ${planValue.decline.toFixed(1)} , ${planValue.declinePct.toFixed(1)}%)
            `;
        }

        // 验证输入并执行分析
        function analyze() {
            const ageGroupInput = document.getElementById('ageGroup');
            const actScoreInput = document.getElementById('actScore');
            const phlegmInput = document.getElementById('phlegmInit');
            const errorSpan = document.getElementById('errorMsg');
            
            // 获取值
            const ageGroup = parseInt(ageGroupInput.value, 10);
            const actScore = parseFloat(actScoreInput.value);
            const initPhlegm = parseFloat(phlegmInput.value);
            
            // 清空错误
            errorSpan.textContent = '';
            
            // 验证
            if (isNaN(ageGroup) || ageGroup < 1 || ageGroup > 5 || !Number.isInteger(ageGroup)) {
                errorSpan.textContent = '❌ 年龄组必须为1~5的整数';
                return;
            }
            if (isNaN(actScore) || actScore < 0 || actScore > 100) {
                errorSpan.textContent = '❌ 活动总分需在0~100之间';
                return;
            }
            if (isNaN(initPhlegm) || initPhlegm < 0 || initPhlegm > 100) {
                errorSpan.textContent = '❌ 痰湿积分需在0~100之间';
                return;
            }
            
            try {
                const schemes = generateSchemes(initPhlegm, ageGroup, actScore);
                if (schemes.length === 0) {
                    errorSpan.textContent = '⚠️ 无可行方案 (预算内无解)';
                    return;
                }
                
                const planEffect = selectMaxEffect(schemes);
                const planValue = selectBestValue(schemes);
                
                // 更新文本和图表
                updateDetailText(planEffect, planValue, initPhlegm);
                renderCharts(initPhlegm, planEffect, planValue);
                
            } catch (e) {
                errorSpan.textContent = `⚠️ 计算错误: ${e.message}`;
                console.error(e);
            }
        }

        // 绑定事件 & 初始化默认示例
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('analyzeBtn');
            btn.addEventListener('click', analyze);
            
            // 页面加载后自动运行一次 (默认数据 2, 38, 64)
            setTimeout(() => {
                analyze();
            }, 50);
        });

    })();
</script>
</body>
</html>
